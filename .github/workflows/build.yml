name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai keyboard pyperclip pystray Pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name QuickTranslator main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Windows
          path: dist/QuickTranslator.exe
          retention-days: 30
