name: Build Quick Translator (Tauri)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app (release)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: src-tauri

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Windows
          path: src-tauri/target/release/quick-translator.exe
          retention-days: 30

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
