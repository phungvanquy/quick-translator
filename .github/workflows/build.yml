name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --onefile --noconsole --uac-admin
          --name QuickTranslator
          --icon icon.ico
          --hidden-import pystray._win32
          --hidden-import mistune
          --add-data "constants.py;."
          --add-data "chat_popup.py;."
          --add-data "config.py;."
          --add-data "api.py;."
          --add-data "settings.py;."
          --add-data "utils.py;."
          --add-data "translate_popup.py;."
          --add-data "hotkeys.py;."
          --add-data "tray.py;."
          --add-data "tts.py;."
          --add-data "icon.ico;."
          --add-data "icon.png;."
          main.py

      - name: Build Installer
        run: iscc installer.iss

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Windows
          path: dist/QuickTranslator.exe
          retention-days: 30

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Setup
          path: installer_output/QuickTranslator-Setup.exe
          retention-days: 30
