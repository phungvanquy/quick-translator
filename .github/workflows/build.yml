name: Build Quick Translator (Tauri)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-tauri (Tauri CLI)
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (release)
        run: cargo tauri build
        working-directory: src-tauri

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Windows
          path: src-tauri/target/release/quick-translator.exe
          retention-days: 30

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslator-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
