<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div class="chat-window">
    <!-- Header: the ONLY draggable zone -->
    <div class="header" data-tauri-drag-region>
      <span class="header-title" id="header-title" data-tauri-drag-region>💬 Chat</span>
      <button class="close-btn" id="close-btn" title="Close (Esc)">✕</button>
    </div>

    <!-- Context strip (hidden in free-chat mode) -->
    <div class="context-strip" id="context-strip">
      <span class="context-text" id="context-text"></span>
      <button class="context-clear" id="context-clear" title="Clear context">✕</button>
    </div>

    <!-- Scrollable transcript -->
    <div class="transcript" id="transcript"></div>

    <!-- Input bar pinned to bottom -->
    <div class="input-bar">
      <textarea
        class="chat-input"
        id="chat-input"
        rows="1"
        placeholder="Ask a question…"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button class="btn-send" id="send-btn">Send</button>
    </div>
  </div>

  <script src="markdown.js"></script>
  <script src="chat.js"></script>
</body>
</html>
