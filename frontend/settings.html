<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Translator — Settings</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Quick Translator Settings</h1>

    <form id="settings-form" autocomplete="off">
      <div class="field">
        <label class="label" for="api-key">API Key</label>
        <input
          class="input"
          type="password"
          id="api-key"
          name="api_key"
          placeholder="sk-…"
          autocomplete="off"
          spellcheck="false"
        />
        <span class="field-hint">Your OpenAI-compatible API key.</span>
      </div>

      <div class="field">
        <label class="label" for="base-url">Base URL</label>
        <input
          class="input"
          type="text"
          id="base-url"
          name="base_url"
          placeholder="https://api.openai.com/v1"
          spellcheck="false"
        />
        <span class="field-hint">OpenAI-compatible endpoint. Change for local LLMs or proxies.</span>
      </div>

      <div class="field">
        <label class="label" for="model">Model</label>
        <input
          class="input"
          type="text"
          id="model"
          name="model"
          placeholder="gpt-4o-mini"
          spellcheck="false"
        />
        <span class="field-hint">Model identifier, e.g. gpt-4o-mini or llama3.</span>
      </div>

      <div class="field">
        <label class="label" for="target-lang">Target Language</label>
        <input
          class="input"
          type="text"
          id="target-lang"
          name="target_language"
          placeholder="Vietnamese"
          spellcheck="false"
        />
        <span class="field-hint">Language to translate into, e.g. Vietnamese, French.</span>
      </div>

      <div class="field">
        <label class="label" for="custom-prompt">Custom Prompt</label>
        <textarea
          class="input textarea"
          id="custom-prompt"
          name="custom_prompt"
          rows="4"
          spellcheck="false"
        ></textarea>
        <div class="prompt-footer">
          <span class="field-hint">Use <code>{target_language}</code> as a placeholder. Leave blank for default.</span>
          <button type="button" class="btn-link" id="reset-prompt-btn">Reset to default</button>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary" id="save-btn">Save</button>
        <button type="button" class="btn-secondary" id="test-btn">Test connection</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </form>
  </div>

  <script src="settings.js"></script>
</body>
</html>
